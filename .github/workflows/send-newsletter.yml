name: Send Newsletter

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install gray-matter marked juice

      - name: Create newsletter drafts
        run: node .github/scripts/send-newsletter.mjs
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          NEWSLETTER_START_DATE: ${{ vars.NEWSLETTER_START_DATE }}
