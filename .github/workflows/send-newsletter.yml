name: Draft Newsletter

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug to draft (leave empty for latest unsent post)'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install gray-matter marked juice

      - name: Create newsletter draft
        run: node .github/scripts/send-newsletter.mjs ${{ inputs.slug && format('--slug={0}', inputs.slug) || '' }}
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          NEWSLETTER_START_DATE: ${{ vars.NEWSLETTER_START_DATE }}
